<!DOCTYPE HTML>
<html>
<head>
<title>Exercise 1</title>

  <!-- Headings and content for Exercise 1 -->

<h1>Module 1  Exercise 1</h1> 
<!--
      Reference the Exercise 1 text file using an iframe to display the content of the text file on the webpage.
      The text file contains instructions for Exercise 1, which is to create a simple webpage with
        a header, a paragraph of text, and a link to return to the main portfolio page.
-->

<iframe src="Exercise1.txt" class="text-frame">
</iframe>


<!--css -->

<style>
    
 /*
    CSS styles for Exercise 1

    The html <iframe> element is used to embed another document (Exercise1.txt) within the current HTML document.
        The .text-frame class is applied to the iframe to style it with a specific width, height, border, and border-radius.
        The .home-link class styles the link that allows users to return to the main portfolio page, including its appearance and hover effect.

*/
.text-frame {
	width: 50%;
	height: 720px;
    border: 2px solid #ccc;
    border-radius: 10px;

}
/*
   .home-link:hover defines the styles that will be applied to the link when a user hovers over it with their mouse. In this case, 
              the background color of the link changes to a darker shade of blue (#2d5bc4) when hovered,
              providing visual feedback to the user that the link is interactive.
    
} */
.home-link {
    display: inline-block;
    margin: 20px;
    padding: 10px 15px;
    background-color: #1f3c88;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.home-link:hover {
    background-color: #2d5bc4;
}
</style>
</head>

<body>

 <!-- Link to return to the main portfolio page 
        appears at top of page (Excercise 2)-->

<a class="home-link" href="../index.html">
    ← Return to Portfolio
</a>


</body>
</html>
